<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Go Wasm Form Example</title>
    <script src="wasm_exec.js"></script>
    <script>
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
            document.getElementById("submitBtn").disabled = false;
        });

        function handleSubmit(event) {
            event.preventDefault();
            const inputText = document.getElementById("inputArea").value;
            const result = goProcessText(inputText);
            document.getElementById("outputArea").value = result;
        }
    </script>
</head>
<body>
    <form onsubmit="handleSubmit(event)">
        <label for="inputArea">Input Text:</label><br>
        <textarea id="inputArea" rows="4" cols="50" placeholder="Type something here..."></textarea><br>
        
        <button type="submit" id="submitBtn" disabled>Process via Go Wasm</button>
    </form>

    <br>
    <label for="outputArea">Result from Go:</label><br>
    <textarea id="outputArea" rows="4" cols="50" readonly></textarea>
</body>
</html>
